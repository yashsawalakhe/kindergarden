<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kindergarden Calendar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Base Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Comic Sans MS', cursive, sans-serif;
    }

    body {
      background: linear-gradient(to bottom right, #fef6e4, #e0f7fa);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    /* Header */
    header {
      background: linear-gradient(to right, #ff99cc, #9966ff);
      color: white;
      padding: 50px 20px 30px;
      text-align: center;
      position: relative;
      overflow: hidden;
      animation: slideDown 1s ease;
    }

    header h1 {
      font-size: 3rem;
      background: linear-gradient(to right, #ffffff, #ffd700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    header p {
      font-size: 1.2rem;
      font-weight: 500;
    }

    header::after {
      content: "☁️";
      font-size: 80px;
      position: absolute;
      top: 10px;
      right: 30px;
      animation: floatCloud 6s ease-in-out infinite;
    }

    /* Calendar Container */
    .calendar-container {
      max-width: 900px;
      margin: 40px auto;
      padding: 25px;
      background: #ffffffdd;
      border-radius: 25px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      animation: fadeInUp 1.2s ease;
      position: relative;
    }

    .calendar-container::before {
      content: "📅";
      font-size: 50px;
      position: absolute;
      top: -30px;
      left: -30px;
      animation: bounce 3s infinite;
    }

    iframe {
      width: 100%;
      height: 600px;
      border: none;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(153, 102, 255, 0.3);
    }

    /* Footer */
    footer {
      margin-top: auto;
      background: #333;
      color: white;
      text-align: center;
      padding: 20px;
      font-size: 0.9rem;
      animation: fadeIn 2s ease;
    }

    /* Animations */
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes floatCloud {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (max-width: 768px) {
      header h1 {
        font-size: 2rem;
      }

      iframe {
        height: 400px;
      }

      .calendar-container::before {
        font-size: 35px;
        top: -20px;
        left: -20px;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Kindergarden Calendar</h1>
    <p>Plan your month with joy and color ☀️🌈</p>
  </header>

  <div class="calendar-container">
    <iframe 
      src="https://calendar.google.com/calendar/embed?src=en.indian%23holiday%40group.v.calendar.google.com&ctz=Asia%2FKolkata">
    </iframe>
  </div>

  <footer>
    <p>&copy; 2025 Kindergarden Lonara | Built with 💖 for happy learning</p>
  </footer>

</body>
</html>
