<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School Website</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #f7f9fc;
      overflow-x: hidden;
    }

    header {
      background: linear-gradient(to right, #8f00ff, #ffce00);
      padding: 20px 40px;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: fadeInDown 1s ease-out;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    .hero {
      background: linear-gradient(to bottom right, #a258ff, #f8e71c);
      color: white;
      padding: 60px 20px;
      text-align: center;
      animation: slideFadeIn 1.2s ease-in-out;
    }

    .hero h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      animation: scaleUp 1.2s ease-in-out;
    }

    .hero h1 span {
      background: linear-gradient(to right, #00c3ff, #ff6ec4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      font-size: 1.2rem;
      margin-bottom: 30px;
    }

    .hero button {
      padding: 15px 30px;
      font-size: 1rem;
      border: none;
      border-radius: 25px;
      background-color: #fff;
      color: #8f00ff;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      animation: bounceIn 1.4s ease;
    }

    .hero button:hover {
      background: #ffce00;
      color: white;
      transform: scale(1.05);
    }

    /* Fees Section */
    #fees-structure {
      padding: 40px;
      background: #eef2f5;
    }

    #fees-structure h2 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 25px;
      color: #8f00ff;
    }

    #fees-structure .table-container {
      overflow-x: auto;
      max-width: 1000px;
      margin: auto;
    }

    #fees-structure table {
      width: 100%;
      border-collapse: collapse;
      text-align: center;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 6px 16px rgba(0,0,0,0.05);
    }

    #fees-structure th {
      background: #f2f2f2;
      color: #333;
      font-weight: bold;
      padding: 12px;
      border-bottom: 2px solid #ddd;
    }

    #fees-structure td {
      padding: 10px;
      border-bottom: 1px solid #eee;
    }

    #fees-structure tr:hover {
      background: #fafafa;
      transition: 0.3s;
    }

    
    /* Animations */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideFadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes scaleUp {
      0% { transform: scale(0.9); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes bounceIn {
      0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-10px); }
      60% { transform: translateY(-5px); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      .hero h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <h3>Where Little <span>Dreams</span> Come True</h3>
    <nav>
      <a href="home.html">Home</a>
      <a href="about.html">About Us</a>
      <a href="gallery.html">Gallery</a>
      <a href="#fees-structure">Fees Structure</a>
      <a href="calender.html">Calendar</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <!-- Fees Structure -->
  <section id="fees-structure">
    <h2>Fees Structure</h2>
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Class</th>
            <th>Admission (₹)</th>
            <th>Tuition (Monthly ₹)</th>
            <th>Transport (Monthly ₹)</th>
            <th>Annual Charges (₹)</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Nursery</td>
            <td>2,000</td>
            <td>1,200</td>
            <td>800</td>
            <td>1,000</td>
          </tr>
          <tr>
            <td>LKG</td>
            <td>2,500</td>
            <td>1,400</td>
            <td>900</td>
            <td>1,200</td>
          </tr>
          <tr>
            <td>UKG</td>
            <td>2,500</td>
            <td>1,500</td>
            <td>900</td>
            <td>1,200</td>
          </tr>
          <tr>
            <td>1st Grade</td>
            <td>3,000</td>
            <td>1,800</td>
            <td>1,000</td>
            <td>1,500</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>

  
</body>
</html>
